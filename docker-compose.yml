services:
  backend:
    build:
      context: ./backend
    container_name: matter-acc-backend
    restart: unless-stopped
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      FLASK_DEBUG: 0
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:-change-this-secret}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    ports:
      - "5000:5000"
    volumes:
      - ./backend/storage:/app/storage

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:5000}
    container_name: matter-acc-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://127.0.0.1:5000}
    ports:
      - "3000:3000"
